services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spaceflow
      POSTGRES_PASSWORD: spaceflow
      POSTGRES_DB: spaceflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spaceflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
